<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý yêu cầu thuê - Smart Stay</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/uno.css}">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --accent: #0ea5e9;
            --slate-800: #1e293b;
            --slate-500: #64748b;
        }

        body {
            background: radial-gradient(circle at top left, #f0f9ff 0%, #e0f2fe 50%, #eff6ff 100%);
            min-height: 100vh;
            font-family: 'Be Vietnam Pro', sans-serif;
            color: var(--slate-800);
            margin: 0;
            overflow-x: hidden;
        }

        /* Glassmorphism styling */
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        /* Header Styles */
        .page-header {
            padding: 30px 0;
            margin-bottom: 20px;
            position: relative;
        }

        .page-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        /* Card Styles */
        .request-card {
            background: rgba(255, 255, 255, 0.8);
            border-radius: 24px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.03);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .request-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(37, 99, 235, 0.1);
            background: #ffffff;
            border-color: rgba(59, 130, 246, 0.2);
        }

        /* Avatar & Images */
        .avatar-img {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        .room-img {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            object-fit: cover;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* Badges */
        .status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .status-badge::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .status-PENDING {
            background: #fffbeb; color: #d97706; border: 1px solid #fde68a;
        }
        .status-PENDING::before { background: #d97706; box-shadow: 0 0 8px #d97706; }

        .status-APPROVED {
            background: #ecfdf5; color: #059669; border: 1px solid #a7f3d0;
        }
        .status-APPROVED::before { background: #059669; box-shadow: 0 0 8px #059669; }

        .status-REJECTED {
            background: #fef2f2; color: #dc2626; border: 1px solid #fecaca;
        }
        .status-REJECTED::before { background: #dc2626; box-shadow: 0 0 8px #dc2626; }

        /* Badge hợp đồng trên card */
        .contract-badge {
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #eef2ff;
            color: #6366f1;
            border: 1px solid #c7d2fe;
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 700;
            white-space: nowrap;
        }

        /* Modal chi tiết */
        #detail-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            z-index: 100;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #detail-overlay.show {
            opacity: 1;
        }

        #detail-card {
            background: #ffffff;
            border-radius: 32px;
            padding: 32px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transform: translateY(20px) scale(0.95);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-height: 90vh;
            overflow-y: auto;
        }

        #detail-overlay.show #detail-card {
            transform: translateY(0) scale(1);
        }

        /* Custom Scrollbar for modal */
        #detail-card::-webkit-scrollbar { width: 6px; }
        #detail-card::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Buttons */
        .btn-modern {
            padding: 12px 24px;
            border-radius: 16px;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            border: none;
        }

        .btn-accept {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            box-shadow: 0 8px 16px rgba(16, 185, 129, 0.2);
        }
        .btn-accept:hover { transform: translateY(-2px); box-shadow: 0 12px 20px rgba(16, 185, 129, 0.3); }

        .btn-reject {
            background: white;
            color: #ef4444;
            border: 2px solid #fee2e2;
        }
        .btn-reject:hover { background: #fef2f2; border-color: #fca5a5; }

        .btn-chat {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            box-shadow: 0 8px 16px rgba(59, 130, 246, 0.2);
        }
        .btn-chat:hover { transform: translateY(-2px); box-shadow: 0 12px 20px rgba(59, 130, 246, 0.3); }

        .btn-contract {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
            box-shadow: 0 8px 16px rgba(99, 102, 241, 0.2);
        }
        .btn-contract:hover { transform: translateY(-2px); box-shadow: 0 12px 20px rgba(99, 102, 241, 0.3); }

        /* Nút tạo phòng quản lý (màu teal/cyan để phân biệt với hợp đồng) */
        .btn-room-manage {
            background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
            color: white;
            box-shadow: 0 8px 16px rgba(14, 165, 233, 0.2);
        }
        .btn-room-manage:hover { transform: translateY(-2px); box-shadow: 0 12px 20px rgba(14, 165, 233, 0.3); }
    </style>
</head>
<body class="p-6 md:p-10">
<div class="max-w-6xl mx-auto">
    <header class="page-header flex flex-col md:flex-row justify-between items-start md:items-center">
        <div>
            <h1 class="page-title">Yêu cầu thuê nhà</h1>
            <p class="text-slate-500 font-medium">Quản lý và phản hồi các yêu cầu từ khách hàng tiềm năng.</p>
        </div>
        <a href="/" class="mt-4 md:mt-0 flex items-center gap-2 px-5 py-2.5 bg-white rounded-full text-primary font-bold shadow-sm hover:shadow-md transition border border-blue-100 no-underline">
            ← Về trang chủ
        </a>
    </header>

    <div id="request-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="col-span-full py-20 flex flex-col items-center justify-center">
            <div class="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mb-4"></div>
            <p class="text-slate-500 font-medium">Đang tải danh sách yêu cầu...</p>
        </div>
    </div>
</div>

<div id="detail-overlay" onclick="closeDetail(event)">
    <div id="detail-card" onclick="event.stopPropagation()">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold text-slate-900 font-['Space_Grotesk']">Chi tiết yêu cầu</h2>
            <button onclick="closeDetail()" class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-500 hover:bg-slate-200 transition">✕</button>
        </div>
        <div id="detail-content">
        </div>
        <div class="mt-8 flex gap-4" id="action-buttons">
        </div>
    </div>
</div>

<script src="/js/rentalRequests.js"></script>
</body>
</html>
