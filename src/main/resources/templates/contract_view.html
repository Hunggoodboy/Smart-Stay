<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo cáo sự cố | Smart Stay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/uno.css}">
    <style>
        .incident-select-menu {
            padding: 6px;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.14), 0 2px 6px rgba(15, 23, 42, 0.08);
        }

        .incident-select-option {
            appearance: none;
            border: 0;
            outline: 0;
            box-shadow: none;
            background: transparent;
            border-radius: 10px;
            cursor: pointer;
        }

        .incident-select-option:hover {
            background: #eff6ff;
            color: #1e40af;
        }

        .incident-select-option:focus-visible {
            background: #dbeafe;
            color: #1d4ed8;
            outline: 0;
        }

        .incident-select-option.is-active {
            background: #dbeafe;
            color: #1d4ed8;
            font-weight: 600;
        }
    </style>
</head>

<body
    class="min-h-screen bg-[radial-gradient(circle_at_top,_#fef3c7_0%,_#ffffff_35%,_#dbeafe_100%)] text-slate-800 antialiased [font-family:'Be_Vietnam_Pro',sans-serif]">
    <div class="pointer-events-none fixed inset-0 overflow-hidden">
        <div class="absolute -top-22 -left-22 h-64 w-64 rounded-full bg-amber-300/45 blur-3xl animate-pulse"></div>
        <div class="absolute -bottom-24 -right-20 h-80 w-80 rounded-full bg-sky-300/45 blur-3xl animate-pulse"></div>
    </div>

    <header class="fixed top-0 left-0 z-50 w-full border-b border-gray-200 bg-white font-sans shadow-sm">
        <div class="px-4 py-3 sm:px-6">
            <div class="flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
                <div class="flex flex-col gap-3 lg:flex-row lg:items-center">
                    <div class="flex items-center gap-3">
                        <div
                            class="grid h-10 w-10 place-items-center rounded-xl bg-[linear-gradient(145deg,_#0f172a,_#1d4ed8)] text-sm text-white font-extrabold [font-family:'Space_Grotesk',sans-serif]">
                            S</div>
                        <div class="flex flex-col justify-center">
                            <p class="m-0 text-base font-bold">Smart Stay</p>
                            <p class="hidden m-0 text-sm font-medium text-slate-500 sm:block">Nền tảng quản lí phòng
                                trọ uy tín</p>
                        </div>
                    </div>
                    <nav class="flex flex-wrap gap-3 text-sm font-semibold text-slate-600">
                        <a href="/myHome"
                            class="cursor-pointer rounded-lg px-3 py-2 text-slate-600 no-underline transition hover:bg-gray-50 hover:text-slate-900">Tổng
                            quan</a>
                        <a href="/payment"
                            class="cursor-pointer rounded-lg px-3 py-2 text-slate-600 no-underline transition hover:bg-gray-50 hover:text-slate-900">Hóa
                            đơn & thanh toán</a>
                        <a href="/myContracts"
                            class="cursor-pointer rounded-lg px-3 py-2 text-slate-600 no-underline transition hover:bg-gray-50 hover:text-slate-900">Hợp
                            đồng</a>
                        <a href="/incident-report"
                            class="cursor-pointer rounded-lg bg-slate-100 px-3 py-2 text-slate-900 no-underline">Báo
                            cáo sự cố</a>
                    </nav>
                </div>

                <div class="flex items-center gap-3">
                    <!-- Notification Bell + Dropdown -->
                    <div class="relative" id="notif-menu">
                        <button id="notif-bell-btn" onclick="toggleNotifDropdown()"
                            class="relative p-2 text-gray-500 hover:text-blue-600 transition-colors border-0 bg-transparent outline-none cursor-pointer rounded-lg hover:bg-gray-50">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                                <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                            </svg>
                            <span id="notification-dot" class="absolute top-1 right-1 flex h-2.5 w-2.5">
                                <span
                                    class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-red-500"></span>
                            </span>
                        </button>

                        <!-- Notification dropdown panel -->
                        <div id="notif-dropdown"
                            style="display:none;position:absolute;right:0;top:calc(100% + 8px);width:360px;background:#fff;border-radius:16px;border:1px solid #e5e7eb;box-shadow:0 16px 48px rgba(0,0,0,0.12);z-index:200;overflow:hidden;">

                            <!-- Header -->
                            <div
                                style="padding:16px 20px 12px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between;">
                                <div style="display:flex;align-items:center;gap:8px;">
                                    <span style="font-weight:700;font-size:15px;color:#1e293b;">Thông báo</span>
                                    <span id="notif-badge"
                                        style="display:none;background:#ef4444;color:#fff;border-radius:999px;padding:1px 8px;font-size:11px;font-weight:700;">0</span>
                                </div>
                                <button onclick="markAllRead()"
                                    style="font-size:12px;color:#3b82f6;background:none;border:none;cursor:pointer;font-weight:600;padding:4px 8px;border-radius:6px;">Đánh
                                    dấu đã đọc</button>
                            </div>

                            <!-- List -->
                            <div id="notif-dropdown-list" style="max-height:380px;overflow-y:auto;">
                                <div id="notif-loading"
                                    style="padding:32px;text-align:center;color:#94a3b8;font-size:13px;">
                                    Đang tải...
                                </div>
                            </div>

                            <!-- Footer -->
                            <div style="padding:10px 20px;border-top:1px solid #f1f5f9;">
                                <button onclick="openChat();closeNotifDropdown();"
                                    style="width:100%;padding:9px;background:#f8fafc;border:1px solid #e5e7eb;border-radius:10px;color:#1e293b;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;">
                                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#3b82f6"
                                        stroke-width="2.5">
                                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                                    </svg>
                                    Nhắn tin chủ nhà
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- ===== INBOX ICON + DROPDOWN ===== -->
                    <div class="relative" id="inbox-menu">
                        <button id="inbox-btn" onclick="toggleInboxDropdown()"
                            class="relative p-2 text-gray-500 hover:text-blue-600 transition-colors border-0 bg-transparent outline-none cursor-pointer rounded-lg hover:bg-gray-50">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                            </svg>
                            <span id="inbox-dot"
                                style="display:none;position:absolute;top:4px;right:4px;width:10px;height:10px;background:#3b82f6;border-radius:50%;border:2px solid #fff;"></span>
                        </button>

                        <!-- Inbox dropdown -->
                        <div id="inbox-dropdown"
                            style="display:none;position:absolute;right:0;top:calc(100% + 8px);width:320px;background:#fff;border-radius:16px;border:1px solid #e5e7eb;box-shadow:0 16px 48px rgba(0,0,0,0.12);z-index:200;overflow:hidden;animation:notifDrop .2s cubic-bezier(.16,1,.3,1);">

                            <!-- Header -->
                            <div
                                style="padding:14px 18px 12px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between;">
                                <div style="display:flex;align-items:center;gap:8px;">
                                    <span style="font-weight:700;font-size:15px;color:#1e293b;">Tin nhắn</span>
                                    <span id="inbox-unread-badge"
                                        style="display:none;background:#3b82f6;color:#fff;border-radius:999px;padding:1px 8px;font-size:11px;font-weight:700;">0</span>
                                </div>
                                <button onclick="openChat();closeInboxDropdown();"
                                    style="font-size:12px;color:#3b82f6;background:none;border:none;cursor:pointer;font-weight:600;padding:4px 8px;border-radius:6px;font-family:inherit;"
                                    onmouseover="this.style.background='#eff6ff'"
                                    onmouseout="this.style.background='none'">
                                    Mở chat
                                </button>
                            </div>

                            <!-- Conversation list -->
                            <div id="inbox-list" style="max-height:360px;overflow-y:auto;">
                                <div id="inbox-loading"
                                    style="padding:32px;text-align:center;color:#94a3b8;font-size:13px;">
                                    Đang tải...
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- ===== END INBOX ===== -->

                    <div class="h-6 w-px bg-gray-300"></div>
                    <div class="relative" id="user-menu">
                        <button onclick="toggleUserMenu()" id="user-menu-button" type="button" aria-expanded="false"
                            class="flex items-center gap-2 rounded-xl p-1.5 text-left hover:bg-gray-50 border-0 bg-transparent outline-none cursor-pointer">
                            <img src="https://ui-avatars.com/api/?name=Thang&background=eff6ff&color=1d4ed8"
                                alt="Avatar" id="user-avatar" class="w-8 h-8 rounded-full border border-gray-200">
                            <div class="hidden sm:block text-left">
                                <p id="user-room-label" class="text-sm font-semibold text-gray-700 m-0 leading-tight">
                                    Phòng 204</p>
                                <p id="user-role-label" class="text-xs text-gray-500 m-0">Khách thuê</p>
                            </div>
                            <div id="user-menu-chevron" class="i-mdi-chevron-down text-gray-400 transition"></div>
                        </button>
                        <div id="user-dropdown"
                            class="hidden absolute right-0 mt-2 w-56 overflow-hidden rounded-xl border border-gray-100 bg-white py-2 shadow-lg">
                            <div class="border-b border-gray-100 px-4 pb-2 pt-1">
                                <p id="dropdown-user-name" class="m-0 text-sm font-semibold text-gray-800">Phòng 204
                                </p>
                                <p id="dropdown-user-role" class="m-0 mt-1 text-xs text-gray-500">Khách thuê</p>
                            </div>
                            <a href="#"
                                class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-100 no-underline hover:no-underline">
                                <div class="i-material-symbols-person text-lg text-gray-500"></div>
                                <span>Thông tin cá nhân</span>
                            </a>
                            <a href="#"
                                class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-100 no-underline hover:no-underline">
                                <div class="i-material-symbols-password text-lg text-gray-500"></div>
                                <span>Đổi mật khẩu</span>
                            </a>
                            <div class="my-1 h-px bg-gray-100"></div>
                            <form action="/logout" method="post">
                                <button type="submit"
                                    class="flex items-center gap-3 px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 w-full text-left bg-transparent border-0 cursor-pointer">
                                    <div class="i-material-symbols:logout-rounded text-lg text-red-500"></div>
                                    <span>Đăng xuất</span>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="relative z-10 mx-auto max-w-7xl px-4 pt-28 pb-8 sm:px-6 lg:px-8">

    </main>

    <script th:src="@{/js/script.js}" src="../static/js/script.js"></script>
</body>

</html>
