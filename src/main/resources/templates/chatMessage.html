<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.1.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
    <style>
        :root {
            --bg: #0f0f10;
            --surface: #1a1a1e;
            --surface2: #222228;
            --border: #2e2e36;
            --accent: #6c63ff;
            --accent2: #ff6584;
            --text: #e8e8f0;
            --text-muted: #6b6b80;
            --me-bg: #6c63ff;
            --them-bg: #222228;
            --radius: 18px;
            --radius-sm: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(108,99,255,0.08) 0%, transparent 50%),
            radial-gradient(ellipse at 70% 80%, rgba(255,101,132,0.06) 0%, transparent 50%);
            pointer-events: none;
        }

        .chat-container {
            width: 420px;
            height: 680px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 40px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03);
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header */
        .chat-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 14px;
            background: rgba(255,255,255,0.02);
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
            flex-shrink: 0;
            position: relative;
        }

        .avatar::after {
            content: '';
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
            border: 2px solid var(--surface);
        }

        .avatar.offline::after { background: var(--text-muted); }

        .header-info { flex: 1; }

        .header-name {
            font-weight: 600;
            font-size: 15px;
            letter-spacing: -0.2px;
        }

        .header-status {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .header-status.online { color: #22c55e; }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 16px;
        }

        .icon-btn:hover {
            background: var(--border);
            color: var(--text);
            transform: scale(1.05);
        }

        .icon-btn.active {
            background: rgba(108,99,255,0.2);
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Connection banner */
        #connection-banner {
            padding: 10px 24px;
            background: rgba(108,99,255,0.1);
            border-bottom: 1px solid rgba(108,99,255,0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-muted);
        }

        #connection-banner.connected {
            background: rgba(34,197,94,0.08);
            border-bottom-color: rgba(34,197,94,0.15);
            color: #22c55e;
        }

        .connect-btn {
            padding: 5px 14px;
            border-radius: 20px;
            border: 1px solid currentColor;
            background: transparent;
            color: inherit;
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .connect-btn:hover { background: rgba(255,255,255,0.08); }

        /* Messages area */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            scroll-behavior: smooth;
        }

        #messages::-webkit-scrollbar { width: 4px; }
        #messages::-webkit-scrollbar-track { background: transparent; }
        #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .msg-wrapper {
            display: flex;
            flex-direction: column;
            animation: msgIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(8px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .msg-wrapper.me { align-items: flex-end; }
        .msg-wrapper.them { align-items: flex-start; }

        .msg-bubble {
            max-width: 78%;
            padding: 10px 14px;
            border-radius: var(--radius);
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
            position: relative;
        }

        .msg-wrapper.me .msg-bubble {
            background: var(--accent);
            color: #fff;
            border-bottom-right-radius: 6px;
        }

        .msg-wrapper.them .msg-bubble {
            background: var(--them-bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-bottom-left-radius: 6px;
        }

        .msg-meta {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 4px;
            padding: 0 4px;
            font-family: 'DM Mono', monospace;
        }

        .msg-wrapper.me + .msg-wrapper.me .msg-bubble,
        .msg-wrapper.them + .msg-wrapper.them .msg-bubble {
            border-radius: var(--radius);
        }

        /* Date divider */
        .date-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            color: var(--text-muted);
            font-size: 11px;
            font-family: 'DM Mono', monospace;
            letter-spacing: 0.5px;
        }

        .date-divider::before, .date-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* Empty state */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--text-muted);
        }

        .empty-icon {
            font-size: 40px;
            opacity: 0.3;
        }

        .empty-text {
            font-size: 13px;
            text-align: center;
            line-height: 1.6;
        }

        /* Typing indicator */
        .typing-indicator {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
            color: var(--text-muted);
            font-size: 12px;
        }

        .typing-dots {
            display: flex;
            gap: 3px;
        }

        .typing-dots span {
            width: 5px;
            height: 5px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: typing 1.2s infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-4px); opacity: 1; }
        }

        /* Input area */
        .chat-input-area {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            background: rgba(255,255,255,0.01);
        }

        .input-row {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 10px 14px;
            transition: border-color 0.2s;
        }

        .input-row:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(108,99,255,0.1);
        }

        #message-input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            resize: none;
            max-height: 100px;
            line-height: 1.5;
        }

        #message-input::placeholder { color: var(--text-muted); }

        #send-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        #send-btn:hover {
            background: #7c73ff;
            transform: scale(1.1);
        }

        #send-btn:active { transform: scale(0.95); }

        #send-btn svg {
            width: 16px;
            height: 16px;
            fill: white;
            transform: translateX(1px);
        }

        /* Receiver input row */
        .receiver-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .receiver-row input {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 7px 12px;
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            outline: none;
            transition: border-color 0.2s;
        }

        .receiver-row input:focus { border-color: var(--accent); }
        .receiver-row input::placeholder { color: var(--text-muted); }
    </style>
</head>
<body>

<div class="chat-container">
    <!-- Header -->
    <div class="chat-header">
        <div class="avatar" id="receiver-avatar">?</div>
        <div class="header-info">
            <div class="header-name" id="receiver-name">Chọn người nhận</div>
            <div class="header-status" id="connection-status">Chưa kết nối</div>
        </div>
        <div class="header-actions">
            <button class="icon-btn" id="connect-btn" title="Kết nối">⚡</button>
            <button class="icon-btn" id="disconnect-btn" title="Ngắt kết nối" disabled>✕</button>
        </div>
    </div>

    <!-- Connection banner -->
    <div id="connection-banner">
        <span id="banner-text">WebSocket chưa kết nối</span>
        <button class="connect-btn" id="banner-connect-btn">Kết nối</button>
    </div>

    <!-- Messages -->
    <div id="messages">
        <div class="empty-state" id="empty-state">
            <div class="empty-icon">💬</div>
            <div class="empty-text">Chưa có tin nhắn nào.<br>Kết nối và bắt đầu trò chuyện!</div>
        </div>
        <div class="typing-indicator" id="typing-indicator">
            <div class="typing-dots">
                <span></span><span></span><span></span>
            </div>
            <span>đang nhập...</span>
        </div>
    </div>

    <!-- Input area -->
    <div class="chat-input-area">
        <div class="receiver-row">
            <span>Đến:</span>
            <input type="number" id="receiver-id" placeholder="Receiver ID" />
            <span>Từ:</span>
            <input type="number" id="sender-id" placeholder="Sender ID" />
        </div>
        <div class="input-row">
            <textarea id="message-input" rows="1" placeholder="Nhập tin nhắn..."></textarea>
            <button id="send-btn">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>
</div>

<script src="/js/chatMessage.js"></script>
</body>
</html>
