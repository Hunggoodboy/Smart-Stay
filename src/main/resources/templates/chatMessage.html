<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trò chuyện | Smart Stay</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/uno.css}">
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
    <style>
        :root { --primary: #1d4ed8; --bg: #f8fafc; }
        body {
            background: radial-gradient(circle at top, #fef3c7 0%, #ffffff 35%, #dbeafe 100%);
            font-family: 'Be Vietnam Pro', sans-serif;
            height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center;
        }
        .chat-container {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(16px);
            border-radius: 24px; border: 1px solid rgba(255,255,255,0.8); box-shadow: 0 24px 80px rgba(0,0,0,0.08);
            width: 100%; max-width: 1000px; height: 85vh; display: flex; overflow: hidden;
        }
        
        /* Sidebar Styles */
        .sidebar {
            width: 350px; background: white; border-right: 1px solid rgba(0,0,0,0.05);
            display: flex; flex-direction: column;
        }
        .sidebar-header {
            padding: 20px 24px; border-bottom: 1px solid rgba(0,0,0,0.05);
            font-weight: 700; font-size: 20px; color: #0f172a;
            display: flex; align-items: center; gap: 12px;
        }
        .btn-back-home {
            background: #f1f5f9; border: none; width: 36px; height: 36px; border-radius: 12px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s;
            text-decoration: none; color: black; font-size: 18px;
        }
        .btn-back-home:hover { background: #e2e8f0; }
        
        .conversation-list {
            flex: 1; overflow-y: auto;
        }
        .conversation-list::-webkit-scrollbar { width: 6px; }
        .conversation-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .conversation-item {
            padding: 16px 24px; border-bottom: 1px solid rgba(0,0,0,0.03);
            display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.2s;
        }
        .conversation-item:hover, .conversation-item.active {
            background: #f8fafc;
        }
        .conversation-item.active {
            border-left: 4px solid var(--primary); padding-left: 20px;
        }
        
        .conv-avatar {
            width: 48px; height: 48px; border-radius: 50%; background: var(--primary);
            color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0;
            font-size: 18px;
        }
        .conv-info {
            flex: 1; overflow: hidden;
        }
        .conv-name {
            font-weight: 600; font-size: 15px; color: #1e293b; margin-bottom: 4px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .conv-msg {
            font-size: 13px; color: #64748b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .conv-time {
            font-size: 12px; color: #94a3b8;
        }

        /* Chat Area Styles */
        .chat-area {
            flex: 1; display: flex; flex-direction: column; background: #f8fafc;
        }
        .chat-header {
            padding: 20px 24px; border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex; align-items: center; gap: 16px; background: white;
            height: 80px; box-sizing: border-box;
        }
        .avatar {
            width: 44px; height: 44px; border-radius: 50%; background: var(--primary);
            color: white; display: flex; align-items: center; justify-content: center; font-weight: bold;
        }
        .status-dot {
            display: inline-block; width: 8px; height: 8px; border-radius: 50%;
            background: #cbd5e1; margin-right: 4px;
        }
        .status-dot.online { background: #22c55e; box-shadow: 0 0 8px #22c55e; }

        .messages-area {
            flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px;
        }
        .messages-area::-webkit-scrollbar { width: 6px; }
        .messages-area::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .msg-row { display: flex; flex-direction: column; }
        .msg-row.me { align-items: flex-end; }
        .msg-row.them { align-items: flex-start; }

        .bubble {
            max-width: 75%; padding: 12px 16px; border-radius: 20px; font-size: 14px; line-height: 1.5;
        }
        .msg-row.me .bubble {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6); color: white;
            border-bottom-right-radius: 4px;
        }
        .msg-row.them .bubble {
            background: white; border: 1px solid #e2e8f0; color: #1e293b;
            border-bottom-left-radius: 4px;
        }
        .time { font-size: 11px; color: #94a3b8; margin-top: 4px; }

        .input-area {
            padding: 16px 24px; background: white; border-top: 1px solid rgba(0,0,0,0.05);
            display: flex; gap: 12px; align-items: flex-end;
        }
        .input-box {
            flex: 1; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 20px;
            padding: 12px 16px; font-family: inherit; font-size: 14px; outline: none; resize: none; max-height: 100px;
        }
        .input-box:focus { border-color: var(--primary); background: white; }
        .btn-send {
            background: var(--primary); color: white; border: none; width: 44px; height: 44px;
            border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.2s; flex-shrink: 0;
        }
        .btn-send:hover { background: #1e40af; transform: scale(1.05); }
        
        .empty-chat {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #64748b; background: white;
        }
        .empty-chat-icon {
            font-size: 48px; margin-bottom: 16px; opacity: 0.5;
        }
        
        @media (max-width: 768px) {
            .chat-container { border-radius: 0; height: 100vh; max-width: 100%; }
            .sidebar { width: 100%; }
            .chat-area, .empty-chat { display: none !important; width: 100%; }
            
            /* Add active classes to toggle visibility on mobile */
            .chat-container.show-chat .sidebar { display: none; }
            .chat-container.show-chat .chat-area { display: flex !important; }
            
            .chat-header .btn-back { display: flex !important; }
        }
        
        .chat-header .btn-back {
            display: none; background: #f1f5f9; border: none; width: 36px; height: 36px; border-radius: 12px;
            cursor: pointer; align-items: center; justify-content: center; transition: 0.2s;
        }
        .chat-header .btn-back:hover { background: #e2e8f0; }
    </style>
</head>
<body>

<div class="chat-container" id="chatContainer">
    <!-- Sidebar: Danh sách chat -->
    <div class="sidebar">
        <div class="sidebar-header">
            <a href="javascript:history.back()" class="btn-back-home" style="text-decoration:none;">←</a>
            Tin nhắn
        </div>
        <div class="conversation-list" id="conversationList">
            <!-- Loading state -->
            <div style="padding: 20px; text-align: center; color: #94a3b8; font-size: 14px;">Đang tải...</div>
        </div>
    </div>

    <!-- Main Chat Area -->
    <div class="chat-area" id="chatArea" style="display: none;">
        <div class="chat-header">
            <button class="btn-back" onclick="closeChatMobile()">←</button>
            <div class="avatar" id="headerAvatar">?</div>
            <div>
                <div style="font-weight: 700; font-size: 16px; color: #0f172a;" id="headerName">...</div>
                <div style="font-size: 12px; color: #64748b; margin-top: 2px;">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="statusText">Đang tải</span>
                </div>
            </div>
        </div>

        <div class="messages-area" id="messagesArea">
            <div style="text-align: center; color: #94a3b8; font-size: 13px; margin-top: 40px;">Vui lòng chọn một cuộc trò chuyện...</div>
        </div>

        <div class="input-area">
            <textarea id="messageInput" class="input-box" rows="1" placeholder="Nhập tin nhắn..." oninput="this.style.height = '';this.style.height = Math.min(this.scrollHeight, 100) + 'px'"></textarea>
            <button class="btn-send" onclick="sendMessage()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>
    
    <!-- Empty State -->
    <div class="empty-chat" id="emptyChat">
        <div class="empty-chat-icon">💬</div>
        <div style="font-size: 18px; font-weight: 600; color: #0f172a;">Smart Stay Chat</div>
        <div style="font-size: 14px; margin-top: 8px;">Chọn một cuộc trò chuyện để bắt đầu nhắn tin</div>
    </div>
</div>

<script src="/js/chatMessage.js"></script>
</body>
</html>
