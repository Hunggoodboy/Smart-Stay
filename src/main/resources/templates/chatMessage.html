<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trò chuyện | Smart Stay</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/uno.css}">
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
    <style>
        :root { --primary: #1d4ed8; --bg: #f8fafc; }
        body {
            background: radial-gradient(circle at top, #fef3c7 0%, #ffffff 35%, #dbeafe 100%);
            font-family: 'Be Vietnam Pro', sans-serif;
            height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center;
        }
        .chat-card {
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(16px);
            border-radius: 32px; border: 1px solid white; box-shadow: 0 24px 80px rgba(0,0,0,0.08);
            width: 100%; max-width: 480px; height: 85vh; display: flex; flex-direction: column; overflow: hidden;
        }
        .chat-header {
            padding: 20px 24px; border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex; align-items: center; gap: 16px; background: white;
        }
        .btn-back {
            background: #f1f5f9; border: none; width: 36px; height: 36px; border-radius: 12px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .btn-back:hover { background: #e2e8f0; }
        .avatar {
            width: 44px; height: 44px; border-radius: 50%; background: var(--primary);
            color: white; display: flex; align-items: center; justify-content: center; font-weight: bold;
        }
        .status-dot {
            display: inline-block; width: 8px; height: 8px; border-radius: 50%;
            background: #cbd5e1; margin-right: 4px;
        }
        .status-dot.online { background: #22c55e; box-shadow: 0 0 8px #22c55e; }

        .messages-area {
            flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px;
        }
        .messages-area::-webkit-scrollbar { width: 6px; }
        .messages-area::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .msg-row { display: flex; flex-direction: column; }
        .msg-row.me { align-items: flex-end; }
        .msg-row.them { align-items: flex-start; }

        .bubble {
            max-width: 75%; padding: 12px 16px; border-radius: 20px; font-size: 14px; line-height: 1.5;
        }
        .msg-row.me .bubble {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6); color: white;
            border-bottom-right-radius: 4px;
        }
        .msg-row.them .bubble {
            background: white; border: 1px solid #e2e8f0; color: #1e293b;
            border-bottom-left-radius: 4px;
        }
        .time { font-size: 11px; color: #94a3b8; margin-top: 4px; }

        .input-area {
            padding: 16px 24px; background: white; border-top: 1px solid rgba(0,0,0,0.05);
            display: flex; gap: 12px; align-items: flex-end;
        }
        .input-box {
            flex: 1; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 20px;
            padding: 12px 16px; font-family: inherit; font-size: 14px; outline: none; resize: none; max-height: 100px;
        }
        .input-box:focus { border-color: var(--primary); background: white; }
        .btn-send {
            background: var(--primary); color: white; border: none; width: 44px; height: 44px;
            border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.2s; flex-shrink: 0;
        }
        .btn-send:hover { background: #1e40af; transform: scale(1.05); }
    </style>
</head>
<body>

<div class="chat-card">
    <div class="chat-header">
        <button class="btn-back" onclick="window.history.back()">←</button>
        <div class="avatar" id="headerAvatar">?</div>
        <div>
            <div style="font-weight: 700; font-size: 16px; color: #0f172a;" id="headerName">Đang kết nối...</div>
            <div style="font-size: 12px; color: #64748b; margin-top: 2px;">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">Đang tải</span>
            </div>
        </div>
    </div>

    <div class="messages-area" id="messagesArea">
        <div style="text-align: center; color: #94a3b8; font-size: 13px; margin-top: 40px;">Đang tải lịch sử trò chuyện...</div>
    </div>

    <div class="input-area">
        <textarea id="messageInput" class="input-box" rows="1" placeholder="Nhập tin nhắn..." oninput="this.style.height = '';this.style.height = Math.min(this.scrollHeight, 100) + 'px'"></textarea>
        <button class="btn-send" onclick="sendMessage()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
</div>

<script src="/js/chatMessage.js"></script>
</body>
</html>
