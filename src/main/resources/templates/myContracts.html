<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hợp đồng của tôi | Smart Stay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/uno.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            color: #1e293b;
        }

        /* ── Page wrapper ── */
        .page-wrapper {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }

        /* ── Back link ── */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            color: #475569;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 32px;
            transition: all .18s;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        .back-link:hover {
            background: #f1f5f9;
            color: #1e293b;
            transform: translateX(-2px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        /* ── Page title area ── */
        .page-hero {
            margin-bottom: 36px;
        }
        .page-hero-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: #eff6ff;
            color: #2563eb;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: .05em;
            text-transform: uppercase;
            padding: 5px 12px;
            border-radius: 999px;
            margin-bottom: 12px;
            border: 1px solid #dbeafe;
        }
        .page-hero h1 {
            font-size: clamp(24px, 4vw, 34px);
            font-weight: 900;
            color: #0f172a;
            margin: 0 0 8px;
            letter-spacing: -.02em;
        }
        .page-hero p {
            color: #64748b;
            font-size: 15px;
            margin: 0;
        }

        /* ── Tab switcher ── */
        .tab-bar {
            display: flex;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 5px;
            gap: 5px;
            margin-bottom: 28px;
        }
        .tab-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 11px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            font-family: inherit;
            transition: all .2s cubic-bezier(.16,1,.3,1);
            color: #64748b;
            background: transparent;
        }
        .tab-btn:hover { color: #334155; background: rgba(255,255,255,0.7); }
        .tab-btn.active-valid {
            background: #fff;
            color: #1d4ed8;
            box-shadow: 0 2px 10px rgba(37,99,235,.12), 0 0 0 1px #dbeafe;
        }
        .tab-btn.active-expired {
            background: #fff;
            color: #475569;
            box-shadow: 0 2px 10px rgba(0,0,0,.06), 0 0 0 1px #e2e8f0;
        }
        .tab-badge {
            background: #e0e7ff;
            color: #4338ca;
            border-radius: 999px;
            padding: 2px 8px;
            font-size: 11px;
            font-weight: 800;
        }
        .tab-btn.active-expired .tab-badge {
            background: #f1f5f9;
            color: #64748b;
        }

        /* ── Contract cards ── */
        #contractList { display: grid; gap: 14px; }

        .contract-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 18px;
            overflow: hidden;
            cursor: pointer;
            transition: all .22s cubic-bezier(.16,1,.3,1);
            position: relative;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .contract-card:hover {
            border-color: #bfdbfe;
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(37,99,235,.10);
        }
        .contract-card.expired:hover {
            border-color: #cbd5e1;
            box-shadow: 0 8px 24px rgba(0,0,0,.07);
        }
        .contract-card::before {
            content: '';
            position: absolute;
            inset: 0 auto 0 0;
            width: 4px;
        }
        .contract-card.valid::before  { background: linear-gradient(to bottom, #2563eb, #6366f1); }
        .contract-card.expired::before { background: linear-gradient(to bottom, #94a3b8, #cbd5e1); }

        .card-inner {
            padding: 22px 22px 22px 26px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Card header */
        .card-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }
        .card-code {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 5px 12px;
            font-size: 12px;
            font-weight: 800;
            color: #475569;
            letter-spacing: .04em;
            text-transform: uppercase;
        }
        .status-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 999px;
            padding: 5px 14px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: .05em;
            text-transform: uppercase;
        }
        .chip-active  { background: #ecfdf5; color: #059669; border: 1px solid #a7f3d0; }
        .chip-pending { background: #fffbeb; color: #d97706; border: 1px solid #fde68a; }
        .chip-expired { background: #f8fafc; color: #64748b; border: 1px solid #e2e8f0; }

        /* Parties */
        .card-parties {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            background: #f8fafc;
            border: 1px solid #f1f5f9;
            border-radius: 12px;
            padding: 14px 16px;
        }
        .party-item {
            display: flex;
            align-items: center;
            gap: 11px;
        }
        .party-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 2px solid #e2e8f0;
            flex-shrink: 0;
            object-fit: cover;
        }
        .party-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .07em;
            color: #94a3b8;
            margin-bottom: 3px;
        }
        .party-name {
            font-size: 14px;
            font-weight: 700;
            color: #1e293b;
            line-height: 1.3;
        }
        .party-name.party-tenant { color: #2563eb; }

        /* Card footer info */
        .card-footer-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: space-between;
        }
        .card-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .info-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 13px;
            font-weight: 600;
            color: #475569;
        }
        .info-chip svg { color: #94a3b8; flex-shrink: 0; }

        .view-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 18px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            transition: all .18s;
            text-decoration: none;
            flex-shrink: 0;
            border: 1px solid transparent;
        }
        .view-btn.btn-blue {
            background: #eff6ff;
            color: #2563eb;
            border-color: #bfdbfe;
        }
        .view-btn.btn-blue:hover { background: #dbeafe; color: #1d4ed8; }
        .view-btn.btn-gray {
            background: #f8fafc;
            color: #64748b;
            border-color: #e2e8f0;
        }
        .view-btn.btn-gray:hover { background: #f1f5f9; }
        .view-btn svg { transition: transform .18s; }
        .view-btn:hover svg { transform: translateX(3px); }

        /* ── Empty state ── */
        .empty-state {
            text-align: center;
            padding: 64px 32px;
            background: #fff;
            border: 2px dashed #e2e8f0;
            border-radius: 18px;
            color: #94a3b8;
        }
        .empty-state svg { margin: 0 auto 16px; display: block; }
        .empty-state p { margin: 0; font-size: 15px; font-weight: 600; color: #64748b; }

        /* ── Loading skeleton ── */
        .skeleton-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 18px;
            padding: 22px 26px;
        }
        .sk-line {
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 400% 100%;
            animation: shimmer 1.4s ease-in-out infinite;
            border-radius: 6px;
            margin-bottom: 12px;
        }
        .sk-line:last-child { margin-bottom: 0; }
        @keyframes shimmer { 0%{background-position:100% 0} 100%{background-position:-100% 0} }
        .sk-h20 { height: 20px; }
        .sk-h14 { height: 14px; }
        .sk-w30 { width: 30%; }
        .sk-w60 { width: 60%; }
        .sk-w80 { width: 80%; }

        /* Divider in parties */
        .party-divider {
            width: 1px;
            background: #e2e8f0;
            align-self: stretch;
            margin: 0 4px;
        }

        @media (max-width: 600px) {
            .card-parties { grid-template-columns: 1fr; gap: 10px; }
            .card-footer-row { flex-direction: column; align-items: flex-start; }
            .page-wrapper { padding: 24px 16px 64px; }
        }
    </style>
</head>
<body>

<div class="page-wrapper">

    <!-- Back link -->
    <a href="/" class="back-link">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Về trang chủ
    </a>

    <!-- Page hero -->
    <div class="page-hero">
        <div class="page-hero-eyebrow">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            Quản lý hợp đồng
        </div>
        <h1>Hợp đồng của tôi</h1>
        <p>Theo dõi và quản lý các thỏa thuận thuê nhà của bạn</p>
    </div>

    <!-- Tab bar -->
    <div class="tab-bar">
        <button id="tab-valid" class="tab-btn active-valid" onclick="switchTab('valid')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            Còn hiệu lực
            <span class="tab-badge" id="badge-valid">–</span>
        </button>
        <button id="tab-expired" class="tab-btn" onclick="switchTab('expired')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            Đã hết hạn
            <span class="tab-badge" id="badge-expired">–</span>
        </button>
    </div>

    <!-- Contract list -->
    <div id="contractList">
        <div class="skeleton-card">
            <div class="sk-line sk-h20 sk-w30" style="margin-bottom:16px;"></div>
            <div class="sk-line sk-h14 sk-w80"></div>
            <div class="sk-line sk-h14 sk-w60"></div>
        </div>
        <div class="skeleton-card">
            <div class="sk-line sk-h20 sk-w30" style="margin-bottom:16px;"></div>
            <div class="sk-line sk-h14 sk-w80"></div>
            <div class="sk-line sk-h14 sk-w60"></div>
        </div>
    </div>

</div>

<script>
    let currentTab = 'valid';
    let counts = { valid: 0, expired: 0 };

    document.addEventListener("DOMContentLoaded", () => {
        const token = localStorage.getItem('smartstay_token');
        if (!token) { window.location.href = '/login'; return; }

        // Xoá logic check has-room bị sai (chặn landlord và người dùng có hợp đồng hết hạn)

        loadContracts('valid');
    });

    async function loadContracts(type) {
        const token = localStorage.getItem('smartstay_token');
        const container = document.getElementById("contractList");

        container.innerHTML = `
            <div class="skeleton-card">
                <div class="sk-line sk-h20 sk-w30" style="margin-bottom:16px;"></div>
                <div class="sk-line sk-h14 sk-w80"></div>
                <div class="sk-line sk-h14 sk-w60"></div>
            </div>
            <div class="skeleton-card">
                <div class="sk-line sk-h20 sk-w30" style="margin-bottom:16px;"></div>
                <div class="sk-line sk-h14 sk-w80"></div>
                <div class="sk-line sk-h14 sk-w60"></div>
            </div>`;

        const url = type === 'valid' ? '/api/contract/get-my-contracts' : '/api/contract/expired';

        try {
            const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
            if (!res.ok) throw new Error("Lỗi tải hợp đồng");
            const contracts = await res.json();
            counts[type] = contracts.length;
            updateBadges();
            renderContracts(contracts, type);
        } catch (err) {
            container.innerHTML = `
                <div class="empty-state" style="border-color:#fecaca;">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="1.5" style="margin:0 auto 16px;display:block;">
                        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                    <p style="color:#ef4444;">Không thể tải dữ liệu. Vui lòng kiểm tra kết nối!</p>
                </div>`;
        }
    }

    function updateBadges() {
        const bv = document.getElementById('badge-valid');
        const be = document.getElementById('badge-expired');
        if (bv) bv.textContent = counts.valid || '0';
        if (be) be.textContent = counts.expired || '0';
    }

    function switchTab(type) {
        if (currentTab === type) return;
        currentTab = type;

        const tv = document.getElementById('tab-valid');
        const te = document.getElementById('tab-expired');

        tv.className = 'tab-btn' + (type === 'valid' ? ' active-valid' : '');
        te.className = 'tab-btn' + (type === 'expired' ? ' active-expired' : '');

        loadContracts(type);
    }

    function renderContracts(contracts, type) {
        const container = document.getElementById("contractList");
        if (!contracts.length) {
            const msg = type === 'valid'
                ? 'Bạn chưa có hợp đồng nào đang còn hiệu lực.'
                : 'Không có hợp đồng nào đã hết hạn.';
            container.innerHTML = `
                <div class="empty-state">
                    <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1.3">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                    </svg>
                    <p>${msg}</p>
                </div>`;
            return;
        }

        const isExpired = type === 'expired';

        container.innerHTML = contracts.map(c => {
            const statusMap = {
                'ACTIVE':  ['chip-active',  '✓ Đang hiệu lực'],
                'PENDING': ['chip-pending', '◌ Chờ xác nhận'],
                'EXPIRED': ['chip-expired', '✕ Đã hết hạn'],
            };
            const [chipClass, chipText] = isExpired
                ? ['chip-expired', '✕ Đã hết hạn']
                : (statusMap[c.status] || ['chip-pending', c.status]);

            const avatarA = `https://ui-avatars.com/api/?name=${encodeURIComponent(c.landLord?.fullName || 'A')}&background=dbeafe&color=1d4ed8&size=80`;
            const avatarB = `https://ui-avatars.com/api/?name=${encodeURIComponent(c.customer?.fullName || 'B')}&background=d1fae5&color=059669&size=80`;

            const rentFmt = c.monthlyRent ? c.monthlyRent.toLocaleString('vi-VN') + ' ₫/tháng' : '–';
            const addr = c.roomAddress || 'Chưa cập nhật địa chỉ';

            const btnClass = isExpired ? 'btn-gray' : 'btn-blue';

            return `
            <div class="contract-card ${isExpired ? 'expired' : 'valid'}" onclick="location.href='/contractDetail/${c.id}'">
                <div class="card-inner">

                    <!-- Header: code + status -->
                    <div class="card-head">
                        <div class="card-code">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                            Mã: ${c.contractCode || 'N/A'}
                        </div>
                        <span class="status-chip ${chipClass}">${chipText}</span>
                    </div>

                    <!-- Parties -->
                    <div class="card-parties">
                        <div class="party-item">
                            <img src="${avatarA}" class="party-avatar" alt="Landlord">
                            <div>
                                <div class="party-label">Bên A – Cho thuê</div>
                                <div class="party-name">${c.landLord?.fullName || 'N/A'}</div>
                            </div>
                        </div>
                        <div class="party-item">
                            <img src="${avatarB}" class="party-avatar" alt="Tenant">
                            <div>
                                <div class="party-label">Bên B – Thuê nhà</div>
                                <div class="party-name party-tenant">${c.customer?.fullName || 'N/A'}</div>
                            </div>
                        </div>
                    </div>

                    <!-- Footer: address + rent + cta -->
                    <div class="card-footer-row">
                        <div class="card-chips">
                            <span class="info-chip">
                                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                                ${addr}
                            </span>
                            <span class="info-chip">
                                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                                ${rentFmt}
                            </span>
                        </div>
                        <a class="view-btn ${btnClass}" href="/contractDetail/${c.id}" onclick="event.stopPropagation()">
                            Xem hợp đồng
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                        </a>
                    </div>

                </div>
            </div>`;
        }).join('');
    }
</script>
</body>
</html>
