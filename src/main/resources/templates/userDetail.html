<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin thành viên | Smart Stay</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/uno.css}">
    <link rel="stylesheet" href="../static/css/uno.css">
    <style>
        body {
            background: radial-gradient(circle at top, #fef3c7 0%, #ffffff 35%, #dbeafe 100%);
            font-family: 'Be Vietnam Pro', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .profile-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 32px 80px rgba(15, 23, 42, 0.08);
            border-radius: 32px;
            width: 100%;
            max-width: 550px;
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        .profile-card:hover {
            transform: translateY(-4px);
        }
        .avatar-glow {
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.25);
        }
        .badge-role {
            padding: 6px 14px;
            border-radius: 9999px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }
        .role-landlord {
            background: #eff6ff;
            color: #1d4ed8;
            border: 1px solid #bfdbfe;
        }
        .role-tenant {
            background: #ecfdf5;
            color: #059669;
            border: 1px solid #a7f3d0;
        }
        .role-admin {
            background: #fffbeb;
            color: #d97706;
            border: 1px solid #fef3c7;
        }
        .info-row {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.03);
            transition: background 0.2s ease;
        }
        .info-row:hover {
            background: rgba(248, 250, 252, 0.6);
        }
        .info-row:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body class="antialiased">

<div class="profile-card">
    <!-- Header with Back Button -->
    <div class="p-6 pb-4 border-b border-gray-100 flex items-center justify-between">
        <a href="javascript:history.back()" class="flex items-center justify-center w-10 h-10 rounded-xl bg-slate-50 hover:bg-slate-100 border border-slate-200/60 text-slate-700 hover:text-blue-600 transition-all font-bold no-underline" title="Quay lại">
            ←
        </a>
        <h2 class="text-lg font-bold text-slate-800 m-0 [font-family:'Space_Grotesk',sans-serif]">Thông tin thành viên</h2>
        <div class="w-10 h-10"></div> <!-- Spacer -->
    </div>

    <!-- User Header Section -->
    <div class="px-8 py-8 flex flex-col items-center text-center bg-gradient-to-b from-blue-50/40 to-transparent">
        <div class="relative mb-5">
            <img id="userAvatar" src="https://ui-avatars.com/api/?name=User&background=eff6ff&color=1d4ed8" alt="Avatar" class="w-24 h-24 rounded-full border-4 border-white avatar-glow object-cover">
            <div id="userVerifyBadge" class="hidden absolute -bottom-1 -right-1 bg-blue-600 text-white rounded-full p-1.5 border-2 border-white flex items-center justify-center shadow-md">
                <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>
                </svg>
            </div>
        </div>

        <h1 id="userFullName" class="text-2xl font-black text-slate-800 m-0 mb-2 leading-tight">Đang tải...</h1>
        <div class="mb-4">
            <span id="userRoleBadge" class="badge-role role-tenant">Đang tải...</span>
        </div>
        <p id="userUsername" class="text-sm text-slate-400 font-medium m-0">@username</p>
    </div>

    <!-- Detailed Info List -->
    <div class="bg-white rounded-t-3xl border-t border-gray-100/60 p-4">
        <div class="info-row">
            <div class="w-8 h-8 rounded-lg bg-blue-50 text-blue-500 flex items-center justify-center shrink-0 mr-4">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.94.725l.548 2.2a1 1 0 01-.321.988l-1.305.98a10.582 10.582 0 004.872 4.872l.98-1.305a1 1 0 01.988-.321l2.2.548a1 1 0 01.725.94V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                </svg>
            </div>
            <div class="flex-1 min-w-0">
                <p class="text-xs text-slate-400 font-bold uppercase tracking-wider m-0 mb-0.5">Số điện thoại</p>
                <p id="userPhone" class="text-[15px] font-semibold text-slate-800 m-0">-</p>
            </div>
        </div>

        <div class="info-row">
            <div class="w-8 h-8 rounded-lg bg-indigo-50 text-indigo-500 flex items-center justify-center shrink-0 mr-4">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                </svg>
            </div>
            <div class="flex-1 min-w-0">
                <p class="text-xs text-slate-400 font-bold uppercase tracking-wider m-0 mb-0.5">Email</p>
                <p id="userEmail" class="text-[15px] font-semibold text-slate-800 m-0 break-all">-</p>
            </div>
        </div>

        <div class="info-row">
            <div class="w-8 h-8 rounded-lg bg-emerald-50 text-emerald-500 flex items-center justify-center shrink-0 mr-4">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </div>
            <div class="flex-1 min-w-0">
                <p class="text-xs text-slate-400 font-bold uppercase tracking-wider m-0 mb-0.5">Địa chỉ</p>
                <p id="userAddress" class="text-[15px] font-semibold text-slate-800 m-0 leading-snug">-</p>
            </div>
        </div>

        <div class="info-row">
            <div class="w-8 h-8 rounded-lg bg-rose-50 text-rose-500 flex items-center justify-center shrink-0 mr-4">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
            </div>
            <div class="flex-1 min-w-0">
                <p class="text-xs text-slate-400 font-bold uppercase tracking-wider m-0 mb-0.5">Giới tính / Ngày sinh</p>
                <p id="userBio" class="text-[15px] font-semibold text-slate-800 m-0">-</p>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", async () => {
        const token = localStorage.getItem('smartstay_token');
        if (!token) {
            window.location.href = '/login';
            return;
        }

        // Lấy ID người dùng từ path segment cuối cùng
        const pathSegments = window.location.pathname.split('/');
        const userId = pathSegments[pathSegments.length - 1];

        if (!userId || isNaN(userId)) {
            alert("Đường dẫn thành viên không hợp lệ");
            history.back();
            return;
        }

        try {
            const res = await fetch(`/api/user/${userId}`, {
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                }
            });

            if (!res.ok) {
                if (res.status === 401 || res.status === 403) {
                    localStorage.removeItem('smartstay_token');
                    localStorage.removeItem('smartstay_user');
                    document.cookie = 'smartstay_token=; Max-Age=0; path=/';
                    window.location.href = '/login';
                    return;
                }
                throw new Error("Không thể tải thông tin thành viên");
            }

            const user = await res.json();
            
            // Cập nhật DOM
            document.getElementById('userFullName').textContent = user.fullName || "Không tên";
            document.getElementById('userUsername').textContent = user.username ? `@${user.username}` : "";
            document.getElementById('userPhone').textContent = user.phoneNumber || "Chưa cập nhật";
            document.getElementById('userEmail').textContent = user.email || "Chưa cập nhật";
            document.getElementById('userAddress').textContent = user.address || "Chưa cập nhật";

            // Giới tính và ngày sinh
            let bio = user.gender === "MALE" ? "Nam" : (user.gender === "FEMALE" ? "Nữ" : "Chưa cập nhật");
            if (user.dateOfBirth) {
                const dob = new Date(user.dateOfBirth);
                bio += ` • ${dob.toLocaleDateString('vi-VN')}`;
            } else {
                bio += " • Chưa cập nhật ngày sinh";
            }
            document.getElementById('userBio').textContent = bio;

            // Role Badge
            const roleBadge = document.getElementById('userRoleBadge');
            const r = String(user.role || '').toUpperCase();
            if (r === 'ADMIN') {
                roleBadge.textContent = 'Quản trị viên';
                roleBadge.className = 'badge-role role-admin';
            } else if (r === 'LANDLORD') {
                roleBadge.textContent = 'Chủ nhà';
                roleBadge.className = 'badge-role role-landlord';
            } else {
                roleBadge.textContent = 'Khách thuê';
                roleBadge.className = 'badge-role role-tenant';
            }

            // Avatar
            const defaultAvatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(user.fullName || 'User')}&background=eff6ff&color=1d4ed8`;
            document.getElementById('userAvatar').src = user.avatarUrl || defaultAvatar;

            // Verify Badge
            if (user.verified) {
                document.getElementById('userVerifyBadge').classList.remove('hidden');
            }

        } catch (error) {
            console.error("Error loading user profile:", error);
            alert("Lỗi: Không tải được thông tin thành viên này.");
            history.back();
        }
    });
</script>
</body>
</html>
